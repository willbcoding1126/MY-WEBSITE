<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: 100px 20px;
      margin: 0;
    }

    h1 {
      color: #222;
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      font-size: 16px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Website</h1>
  <p>This site is live on GitHub Pages.</p>
  <button onclick="alert('Your website is working!')">Click Me</button>
</body>
</html>
